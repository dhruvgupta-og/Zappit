<!doctype html>
<html lang="en">

    <!-- ── Favicon & Icons ── -->

    <!-- ── Viewport ── -->

    <!-- ── Primary SEO ── -->
    <title>Zappit — Campus Food Delivery, Instantly</title>
    <meta name="title" content="Zappit — Campus Food Delivery, Instantly" />

    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.zappit.shop/" />

    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Zappit" />
    <meta property="og:locale" content="en_IN" />

    <meta name="twitter:description" content="Order food from your campus stores and get it delivered to your doorstep in minutes." />
    <meta name="twitter:image" content="https://zappit.shop/og-image.png" />

    <!-- ── Structured Data (JSON-LD) ── -->
    <script type="application/ld+json">

      "name": "Zappit",
      "url": "https://www.zappit.shop",
