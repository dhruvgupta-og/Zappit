<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#131E3A" />
      <stop offset="100%" stop-color="#0B132B" />
    </linearGradient>
    <!-- Lightning Gradient -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC107" />
      <stop offset="100%" stop-color="#FF9100" />
    </linearGradient>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Rounded Circle with border -->
  <circle cx="256" cy="256" r="236" fill="url(#bgGrad)" stroke="#1E293B" stroke-width="12" />
  
  <!-- Stylized Lightning Bolt with gradient and glow -->
  <path d="M280 60 L140 270 L240 270 L180 452 L360 210 L260 210 Z" fill="url(#boltGrad)" filter="url(#glow)" />
</svg>